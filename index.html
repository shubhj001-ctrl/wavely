<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MU LABZ — Premium Music Streaming</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=Crimson+Text:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="CSS/reset.css" />
  <link rel="stylesheet" href="CSS/variables.css" />
  <link rel="stylesheet" href="CSS/layout.css" />
  <link rel="stylesheet" href="CSS/sidebar.css" />
  <link rel="stylesheet" href="CSS/player.css" />
  <link rel="stylesheet" href="CSS/expanded-player.css" />
  <link rel="stylesheet" href="CSS/components.css" />
  <link rel="stylesheet" href="CSS/pages.css" />
  <link rel="stylesheet" href="CSS/party-room.css" />
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <img src="assets/mu-labz-logo.png" alt="MU LABZ" class="logo-image" />
        <div class="logo-text">MU LABZ</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-label">Menu</div>
          <button class="nav-item active" data-page="home">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            Home
          </button>
          <button class="nav-item" data-page="library">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
            </svg>
            My Library
          </button>
          <button class="nav-item" data-page="party">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <circle cx="9" cy="8" r="3"/><path d="M2 19c0-3 1.5-5 7-5s7 2 7 5"/>
              <circle cx="16" cy="7" r="2.5"/><path d="M11 15c.5-1.5 1-2 3-2s2.5.5 3 2"/>
            </svg>
            Party Room
          </button>
        </div>
      </nav>
      <div class="sidebar-playlists">
        <div class="nav-label">Playlists</div>
        <div class="playlist-list" id="sidebar-playlists">
          <div class="playlist-item" data-playlist="liked">
            <div class="playlist-dot" style="background:#fde8e8">❤️</div>
            <div class="playlist-name">
              <strong>Liked Songs</strong>
              <span id="liked-count">0 songs</span>
            </div>
          </div>
          <div class="playlist-item" data-playlist="chill">
            <div class="playlist-dot" style="background:#e8f5ee">🌿</div>
            <div class="playlist-name"><strong>Chill Vibes</strong></div>
          </div>
          <div class="playlist-item" data-playlist="focus">
            <div class="playlist-dot" style="background:#eef0f8">🎯</div>
            <div class="playlist-name"><strong>Focus Flow</strong></div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main content — pages rendered here -->
    <main class="main" id="main-content"></main>

    <!-- Mobile hamburger menu -->
    <button class="hamburger" id="hamburger" title="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Mobile navigation menu (overlay) -->
    <nav class="mobile-nav" id="mobile-nav">
      <button class="mobile-nav-item active" data-page="home" title="Home">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Home</span>
      </button>
      <button class="mobile-nav-item" data-page="recently-played" title="Recently Played">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>Recent</span>
      </button>
      <button class="mobile-nav-item" data-page="library" title="Library">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
        </svg>
        <span>Library</span>
      </button>
      <button class="mobile-nav-item" data-page="party" title="Party Room">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <circle cx="9" cy="8" r="3"/><path d="M2 19c0-3 1.5-5 7-5s7 2 7 5"/>
          <circle cx="16" cy="7" r="2.5"/><path d="M11 15c.5-1.5 1-2 3-2s2.5.5 3 2"/>
        </svg>
        <span>Party</span>
      </button>
    </nav>

    <!-- Persistent player bar -->
    <div class="player" id="player-bar">
      <div class="player-track">
        <div class="player-art" id="player-art">🎵</div>
        <div class="player-track-info">
          <div class="player-title" id="player-title">—</div>
          <div class="player-artist" id="player-artist">Select a track to play</div>
        </div>
        <button class="player-like" id="player-like-btn" aria-label="Like">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
          </svg>
        </button>
      </div>

      <div class="player-controls">
        <div class="ctrl-row">
          <button class="ctrl-btn" id="shuffle-btn" aria-label="Shuffle">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
              <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="prev-btn" aria-label="Previous">
            <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>
          <button class="play-btn" id="play-btn" aria-label="Play/Pause">
            <svg id="play-icon" width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <button class="ctrl-btn" id="next-btn" aria-label="Next">
            <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
          </button>
          <button class="ctrl-btn" id="repeat-btn" aria-label="Repeat">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <polyline points="17 1 21 5 17 9"/>
              <path d="M3 11V9a4 4 0 014-4h14"/>
              <polyline points="7 23 3 19 7 15"/>
              <path d="M21 13v2a4 4 0 01-4 4H3"/>
            </svg>
          </button>
        </div>
        <div class="progress-row">
          <span class="prog-time" id="time-cur">0:00</span>
          <div class="prog-bar" id="prog-bar">
            <div class="prog-fill" id="prog-fill"></div>
            <div class="prog-thumb" id="prog-thumb"></div>
          </div>
          <span class="prog-time end" id="time-total">0:00</span>
        </div>
      </div>

      <div class="player-right">
        <div class="vol-wrap">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
          </svg>
          <div class="vol-bar" id="vol-bar">
            <div class="vol-fill" id="vol-fill"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <!-- Expanded Player (Full-screen) -->
  <div class="expanded-player" id="expanded-player">
    <div class="ep-ambient">
      <div class="ep-ambient-img" id="ep-ambient-img"></div>
      <div class="ep-ambient-overlay"></div>
    </div>

    <div class="ep-content">
      <div class="ep-header">
        <div class="ep-header-label">Now Playing</div>
        <button class="ep-close" id="ep-close" aria-label="Close player">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="ep-art-wrap">
        <div class="ep-art" id="ep-art">🎵</div>
      </div>

      <div class="ep-track-row">
        <div class="ep-track-text">
          <div class="ep-title" id="ep-title">—</div>
          <div class="ep-artist" id="ep-artist">Select a track</div>
        </div>
        <button class="ep-like" id="ep-like" aria-label="Like">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
          </svg>
        </button>
      </div>

      <div class="ep-progress-wrap">
        <div class="ep-prog-bar" id="ep-prog-bar">
          <div class="ep-prog-fill" id="ep-prog-fill"></div>
          <div class="ep-prog-thumb" id="ep-prog-thumb"></div>
        </div>
        <div class="ep-times">
          <span class="ep-time" id="ep-time-cur">0:00</span>
          <span class="ep-time" id="ep-time-total">0:00</span>
        </div>
      </div>

      <div class="ep-controls">
        <button class="ep-ctrl shuffle" id="ep-shuffle" aria-label="Shuffle">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
          </svg>
        </button>
        <button class="ep-ctrl prev" id="ep-prev" aria-label="Previous">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="ep-play" id="ep-play" aria-label="Play/Pause">
          <svg id="ep-play-icon" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ep-ctrl next" id="ep-next" aria-label="Next">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button class="ep-ctrl repeat" id="ep-repeat" aria-label="Repeat">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <polyline points="17 1 21 5 17 9"/>
            <path d="M3 11V9a4 4 0 014-4h14"/>
            <polyline points="7 23 3 19 7 15"/>
            <path d="M21 13v2a4 4 0 01-4 4H3"/>
          </svg>
        </button>
      </div>

      <div class="ep-spacer"></div>
    </div>
  </div>

  <!-- Hidden YouTube IFrame player (0x0, audio only) -->
  <div style="position:fixed;bottom:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden" aria-hidden="true">
    <div id="yt-player"></div>
  </div>

  <!-- Scripts — order matters -->
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="JS/state.js"></script>
  <script src="JS/api.js"></script>
  <script src="JS/components.js"></script>
  <script src="JS/queue.js"></script> 
  <script src="JS/player.js"></script>
  <script src="JS/expanded-player.js"></script>
  <script src="JS/party.js"></script>
  <script src="JS/Pages/home.js"></script>
  <script src="JS/Pages/search.js"></script>
  <script src="JS/Pages/artist.js"></script>
  <script src="JS/Pages/library.js"></script>
  <script src="JS/Pages/recently-played.js"></script>
  <script src="JS/Pages/party.js"></script>
  <script src="JS/router.js"></script>
  <script src="JS/app.js"></script>
</body>
</html>
